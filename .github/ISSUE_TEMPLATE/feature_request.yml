name: Feature Request
description: Suggest an idea for CoolCars
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a great idea for CoolCars? Let us know!
  - type: textarea
    id: suggestion
    attributes:
      label: Description of the feature
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why is this feature useful? How would it benefit players or server owners?
    validations:
      required: true
