name: Bug Report
description: File a report to help us improve CoolCars
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: What version of CoolCars are you using?
      placeholder: e.g. 1.0.5
    validations:
      required: true
  - type: input
    id: server_version
    attributes:
      label: Server Version
      description: What server software and version are you using?
      placeholder: e.g. Paper 1.21
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How do we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please provide any relevant console logs or errors.
      render: shell
