# Справочник по конфигу CoolCars (RU)
# Этот файл только для документации и не читается плагином автоматически.
# Основной рабочий конфиг: config.yml

keys:
  # Главный переключатель системы ключей машин.
  enabled: true

  # Если true, запуск двигателя проверяется по правилам ключей ниже.
  require-key-to-start-engine: true

  # Если true, для выключения двигателя тоже нужен подходящий ключ в инвентаре.
  require-key-to-stop-engine: true

  # Если true, владелец может завести свою машину без ключа в инвентаре.
  allow-owner-start-without-key: true

  # Если true, не-владелец сможет завести машину при наличии подходящего ключа.
  allow-non-owner-use-key: false

  # Если true, поиск ключа идет по всему инвентарю.
  # Если false, проверяются только main hand и off-hand.
  check-entire-inventory: true

  item:
    # Материал предмета ключа (/cars key give <игрок> <uuid-машины>).
    material: TRIPWIRE_HOOK

    # Поддерживаемые плейсхолдеры:
    # {model} {model_key} {car_uuid} {owner_name} {owner_uuid}
    name: "&6Ключ от {model}"

    # В lore поддерживаются те же плейсхолдеры, что и в имени.
    lore:
      - "&7Машина: &f{model}"
      - "&7UUID: &f{car_uuid}"
      - "&7Владелец: &f{owner_name}"

    # Необязательные переопределения по языку (интеграция с lang-системой).
    localized:
      en:
        name: "&6Key for {model}"
        lore:
          - "&7Vehicle: &f{model}"
          - "&7UUID: &f{car_uuid}"
          - "&7Owner: &f{owner_name}"
      ru:
        name: "&6Ключ от {model}"
        lore:
          - "&7Машина: &f{model}"
          - "&7UUID: &f{car_uuid}"
          - "&7Владелец: &f{owner_name}"

    # Укажите null или удалите строку, чтобы отключить custom model data.
    custom-model-data: null

    # Делает предмет ключа неразрушаемым.
    unbreakable: true

car:
  menu:
    # Количество строк в меню машины (от 1 до 6).
    rows: 3
    # Включить или выключить кнопку багажника в меню.
    trunk-button-enabled: true
    slots:
      # Индексы слотов в инвентаре (начиная с 0).
      engine: 11
      lights: 15
      trunk: 13
    style:
      # Заполнять пустые слоты предметом-заполнителем.
      fill-empty-slots: true
      filler:
        # Материал для заполнителя (например, серая панель).
        material: BLACK_STAINED_GLASS_PANE
        # Имя заполнителя (обычно пробел).
        name: "&8 "
        # CustomModelData для заполнителя (0 для отключения).
        custom-model-data: 0
      items:
        engine:
          # Материал при включенном двигателе.
          material-on: LIME_DYE
          # Материал при выключенном двигателе.
          material-off: RED_DYE
          # CustomModelData при включенном двигателе.
          custom-model-data-on: 0
          # CustomModelData при выключенном двигателе.
          custom-model-data-off: 0
        lights:
          # Материал при включенных фарах.
          material-on: GLOWSTONE_DUST
          # Материал при выключенных фарах.
          material-off: COAL
          # CustomModelData при включенных фарах.
          custom-model-data-on: 0
          # CustomModelData при выключенных фарах.
          custom-model-data-off: 0
        trunk:
          # Материал кнопки багажника.
          material: CHEST
          # CustomModelData для кнопки багажника.
          custom-model-data: 0

sounds:
  events:
    landing:
      # Ключ звука, который играет при жестком приземлении после падения.
      key: "coolcars.landing"
