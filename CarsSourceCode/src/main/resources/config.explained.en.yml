# CoolCars config reference (EN)
# This file is documentation-only and is not read by the plugin automatically.
# Main runtime config: config.yml

keys:
  # Master switch for the car key system.
  enabled: true

  # If true, engine start is validated by key rules below.
  require-key-to-start-engine: true

  # If true, engine stop also requires a matching key in inventory.
  require-key-to-stop-engine: true

  # If true, owner can start own car without carrying a key.
  allow-owner-start-without-key: true

  # If true, non-owner can start the car if they have a matching key.
  allow-non-owner-use-key: false

  # If true, plugin searches key in full inventory.
  # If false, only main hand + off-hand are checked.
  check-entire-inventory: true

  item:
    # Material for generated key item (/cars key give <player> <car-uuid>).
    material: TRIPWIRE_HOOK

    # Supported placeholders:
    # {model} {model_key} {car_uuid} {owner_name} {owner_uuid}
    name: "&6Key for {model}"

    # Lore supports the same placeholders as name.
    lore:
      - "&7Vehicle: &f{model}"
      - "&7UUID: &f{car_uuid}"
      - "&7Owner: &f{owner_name}"

    # Optional per-language override (lang system integration).
    localized:
      en:
        name: "&6Key for {model}"
        lore:
          - "&7Vehicle: &f{model}"
          - "&7UUID: &f{car_uuid}"
          - "&7Owner: &f{owner_name}"
      ru:
        name: "&6Ключ от {model}"
        lore:
          - "&7Машина: &f{model}"
          - "&7UUID: &f{car_uuid}"
          - "&7Владелец: &f{owner_name}"

    # Set null or remove this line to disable custom model data.
    custom-model-data: null

    # Make key item unbreakable.
    unbreakable: true

car:
  menu:
    # Number of rows in the car menu (1 to 6).
    rows: 3
    # Enable or disable the trunk button in the menu.
    trunk-button-enabled: true
    slots:
      # Inventory slot indices (starting from 0).
      engine: 11
      lights: 15
      trunk: 13
    style:
      # Fill empty slots with a filler item.
      fill-empty-slots: true
      filler:
        # Material for filler (e.g. gray stained glass pane).
        material: BLACK_STAINED_GLASS_PANE
        # Display name of filler (usually a space).
        name: "&8 "
        # CustomModelData for filler (0 to disable).
        custom-model-data: 0
      items:
        engine:
          # Material when engine is running.
          material-on: LIME_DYE
          # Material when engine is stopped.
          material-off: RED_DYE
          # CustomModelData when engine is running.
          custom-model-data-on: 0
          # CustomModelData when engine is stopped.
          custom-model-data-off: 0
        lights:
          # Material when lights are on.
          material-on: GLOWSTONE_DUST
          # Material when lights are off.
          material-off: COAL
          # CustomModelData when lights are on.
          custom-model-data-on: 0
          # CustomModelData when lights are off.
          custom-model-data-off: 0
        trunk:
          # Material for the trunk button.
          material: CHEST
          # CustomModelData for the trunk button.
          custom-model-data: 0

sounds:
  events:
    landing:
      # Sound key played on hard landing (fall impact).
      key: "coolcars.landing"
